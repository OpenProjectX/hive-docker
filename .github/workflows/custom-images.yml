name: Custom Images

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_registry:
        description: Image registry/repository prefix
        required: true
        default: ghcr.io/openprojectx
        type: string
      release_version:
        description: Release version, for example 0.1.0
        required: true
        type: string
      next_version:
        description: Next development version, for example 0.1.1-SNAPSHOT
        required: true
        type: string

concurrency:
  group: custom-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[Gradle Release Plugin]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      IMAGE_REGISTRY: ${{ inputs.image_registry || 'ghcr.io/openprojectx' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ startsWith(env.IMAGE_REGISTRY, 'ghcr.io/') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Write signing key
        env:
          SIGNING_KEY_ASC: ${{ secrets.SIGNING_KEY_ASC }}
        run: |
          printf '%s' "$SIGNING_KEY_ASC" > "$RUNNER_TEMP/signing-key.asc"

      - name: Release custom images and Testcontainers jar
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY_FILE: ${{ runner.temp }}/signing-key.asc
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          release_version="${{ inputs.release_version }}"
          next_version="${{ inputs.next_version }}"

          if [ -z "$release_version" ]; then
            current_version="$(sed -n 's/^version *= *//p' gradle.properties)"
            release_version="${current_version%-SNAPSHOT}"
          fi

          if [ -z "$next_version" ]; then
            base_version="${release_version%%-*}"
            major="$(echo "$base_version" | cut -d. -f1)"
            minor="$(echo "$base_version" | cut -d. -f2)"
            patch="$(echo "$base_version" | cut -d. -f3)"
            next_version="$major.$minor.$((patch + 1))-SNAPSHOT"
          fi

          ./gradlew --no-configuration-cache release \
            -Prelease.kind=all \
            -Prelease.useAutomaticVersion=true \
            -Prelease.releaseVersion="$release_version" \
            -Prelease.newVersion="$next_version" \
            -PimageRegistry="$IMAGE_REGISTRY"
