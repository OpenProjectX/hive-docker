name: Custom Images

on:
  workflow_dispatch:
    inputs:
      image:
        description: Image to build
        required: true
        default: hive4
        type: choice
        options:
          - hive4
          - all
          - hive-3.1.3
          - hive-4.2.0
          - standalone-metastore-4.2.0
      image_registry:
        description: Image registry/repository prefix
        required: true
        default: ghcr.io/openprojectx
        type: string
      build_vanilla_first:
        description: Build vanilla base locally before custom image
        required: true
        default: false
        type: boolean
      push:
        description: Push images after build
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ inputs.push && startsWith(inputs.image_registry, 'ghcr.io/') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build vanilla base locally
        if: ${{ inputs.build_vanilla_first }}
        run: |
          set -eux
          case "${{ inputs.image }}" in
            all) task=":image:dockerBuildVanillaAll" ;;
            hive4) task=":image:dockerBuildVanillaHive420 :image:dockerBuildVanillaStandaloneMetastore420" ;;
            hive-3.1.3) task=":image:dockerBuildVanillaHive313" ;;
            hive-4.2.0) task=":image:dockerBuildVanillaHive420" ;;
            standalone-metastore-4.2.0) task=":image:dockerBuildVanillaStandaloneMetastore420" ;;
            *) echo "Unknown image: ${{ inputs.image }}" >&2; exit 1 ;;
          esac
          ./gradlew --no-configuration-cache $task -PimageRegistry="${{ inputs.image_registry }}"

      - name: Build custom image
        run: |
          set -eux
          case "${{ inputs.image }}" in
            all) task=":image:dockerBuildCustomAll" ;;
            hive4) task=":image:dockerBuildCustomHive4" ;;
            hive-3.1.3) task=":image:dockerBuildCustomHive313" ;;
            hive-4.2.0) task=":image:dockerBuildCustomHive420" ;;
            standalone-metastore-4.2.0) task=":image:dockerBuildCustomStandaloneMetastore420" ;;
            *) echo "Unknown image: ${{ inputs.image }}" >&2; exit 1 ;;
          esac
          ./gradlew --no-configuration-cache "$task" -PimageRegistry="${{ inputs.image_registry }}"

      - name: Push custom image
        if: ${{ inputs.push }}
        run: |
          set -eux
          case "${{ inputs.image }}" in
            all)
              docker push "${{ inputs.image_registry }}/hive:3.1.3-hadoop-3.4.2-gcs-4.0.4-jdk17"
              docker push "${{ inputs.image_registry }}/hive:4.2.0-hadoop-3.4.2-gcs-4.0.4-jdk17"
              docker push "${{ inputs.image_registry }}/hive-standalone-metastore:4.2.0-hadoop-3.4.2-gcs-4.0.4-jdk17"
              ;;
            hive4)
              docker push "${{ inputs.image_registry }}/hive:4.2.0-hadoop-3.4.2-gcs-4.0.4-jdk17"
              docker push "${{ inputs.image_registry }}/hive-standalone-metastore:4.2.0-hadoop-3.4.2-gcs-4.0.4-jdk17"
              ;;
            hive-3.1.3)
              docker push "${{ inputs.image_registry }}/hive:3.1.3-hadoop-3.4.2-gcs-4.0.4-jdk17"
              ;;
            hive-4.2.0)
              docker push "${{ inputs.image_registry }}/hive:4.2.0-hadoop-3.4.2-gcs-4.0.4-jdk17"
              ;;
            standalone-metastore-4.2.0)
              docker push "${{ inputs.image_registry }}/hive-standalone-metastore:4.2.0-hadoop-3.4.2-gcs-4.0.4-jdk17"
              ;;
          esac
