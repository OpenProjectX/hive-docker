name: Release Images

on:
  workflow_dispatch:
    inputs:
      image_registry:
        description: Image registry/repository prefix
        required: true
        default: ghcr.io/openprojectx
        type: string
      release_version:
        description: Release version, for example 0.1.0
        required: true
        type: string
      next_version:
        description: Next development version, for example 0.1.1-SNAPSHOT
        required: true
        type: string

jobs:
  release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[Gradle Release Plugin]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ startsWith(inputs.image_registry, 'ghcr.io/') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release Docker images
        run: |
          ./gradlew --no-configuration-cache release \
            -Prelease.useAutomaticVersion=true \
            -Prelease.releaseVersion="${{ inputs.release_version }}" \
            -Prelease.newVersion="${{ inputs.next_version }}" \
            -PimageRegistry="${{ inputs.image_registry }}"
